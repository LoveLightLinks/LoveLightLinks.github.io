<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Light Links | Premium Adult Directory 18+</title>
<meta name="description" content="Love Light Links is a premium model directory featuring curated model profiles with direct access links.">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Love Light Links | Premium Adult Model 18+">
<meta property="og:description" content="Explore curated premium Adult model profiles in one clean directory.">
<meta property="og:image" content="https://lovelightlinks.github.io/images/Icon.png">
<meta property="og:url" content="https://lovelightlinks.github.io/">
<meta property="og:type" content="website">

<style>
body {
margin:0;
font-family: Arial, sans-serif;
background: radial-gradient(circle at top, #2a003f, #000);
color:white;
text-align:center;
}
.header { padding:30px 20px 10px; }
.logo {
width:140px;
display:block;
margin:0 auto;
animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
}
@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }
}
@keyframes glow {
from { filter: drop-shadow(0 0 10px #ff00cc); }
to { filter: drop-shadow(0 0 25px #00ccff); }
}
.age-badge {
display:inline-block;
margin-top:8px;
padding:5px 14px;
font-size:12px;
border-radius:20px;
background: rgba(255,0,204,0.15);
color:#ff00cc;
border:1px solid #ff00cc;
}
.social-links a {
display:inline-block;
margin:5px 10px;
padding:8px 18px;
border-radius:25px;
text-decoration:none;
font-size:14px;
color:white;
border:1px solid #ff00cc;
}
.search-box { margin:20px auto; width:90%; max-width:400px; }
.search-box input {
width:100%;
padding:12px;
border-radius:25px;
border:none;
background:#111;
color:white;
}
.grid {
display:grid;
grid-template-columns: repeat(2, 1fr);
gap:15px;
padding:20px;
max-width:600px;
margin:auto;
}
.card {
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:15px;
cursor:pointer;
}
.card img {
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}
.popup {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}
.popup-content {
width:90%;
max-width:400px;
background:#111;
padding:20px;
border-radius:15px;
}
.slider { position:relative; overflow:hidden; }
.slides { display:flex; transition:transform .4s; }
.slides img { width:100%; }
.nav-btn {
position:absolute;
top:50%;
transform:translateY(-50%);
width:45px;
height:45px;
border-radius:50%;
border:none;
background:rgba(0,0,0,.7);
color:white;
font-size:24px;
}
.left { left:15px; }
.right { right:15px; }
.load-more {
margin:20px auto;
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff00cc,#00ccff);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<img src="https://lovelightlinks.github.io/images/Icon.png" class="logo">
<h1>Love Light Links</h1>
<div class="age-badge">18+ Adults Only</div>

<div class="social-links">
<a href="https://www.instagram.com/love_light_stream" target="_blank">Instagram</a>
<a href="https://x.com/LoveLightStream" target="_blank">X</a>
<a href="https://t.me/lovelightlinks" target="_blank">Telegram</a>
</div>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search Model or Username">
</div>

<div class="grid" id="modelGrid"></div>
<button onclick="loadMore()" class="load-more">Load More</button>

<div class="popup" id="popup">
<div class="popup-content">
<div class="slider">
<button class="nav-btn left" onclick="prevSlide()">❮</button>
<div class="slides" id="slides"></div>
<button class="nav-btn right" onclick="nextSlide()">❯</button>
</div>
<h3 id="popupID"></h3>
<p id="popupDesc"></p>
<button id="visitBtn">Visit</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>
const sheetID="1mLlHZt6MLsEV4Oq0m9_WQPex94v5JbY0pTgr9hL7PjY";
const sheetURL=`https://opensheet.elk.sh/${sheetID}/Sheet1`;

let models=[],shuffled=[],displayed=0,currentSlide=0;

fetch(sheetURL)
.then(r=>r.json())
.then(data=>{
models=data;
shuffled=[...models];
shuffleArray(shuffled);
loadMore();
});

function shuffleArray(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function loadMore(){
const grid=document.getElementById("modelGrid");
for(let i=displayed;i<displayed+10 && i<shuffled.length;i++){
let m=shuffled[i];
let card=document.createElement("div");
card.className="card";
card.innerHTML=`
<img src="https://lovelightlinks.github.io/images/${m.Image1}">
<h3>Model ${m.ID}</h3>`;
card.onclick=()=>openPopup(m);
grid.appendChild(card);
}
displayed+=10;
}

document.getElementById("search").addEventListener("input",function(){
let v=this.value.toLowerCase();
let grid=document.getElementById("modelGrid");
grid.innerHTML="";
displayed=0;
shuffled=models.filter(m=>
(m.ID && m.ID.toLowerCase().includes(v)) ||
(m.Username && m.Username.toLowerCase().includes(v))
);
loadMore();
});

function openPopup(m){
let slides=document.getElementById("slides");
slides.innerHTML="";
["Image1","Image2","Image3","Image4"].forEach(i=>{
if(m[i]){
let img=document.createElement("img");
img.src="https://lovelightlinks.github.io/images/"+m[i];
slides.appendChild(img);
}
});
document.getElementById("popupID").innerText="Model "+m.ID;
document.getElementById("popupDesc").innerText=m.Name;
document.getElementById("visitBtn").onclick=()=>window.open(m.Link,"_blank");
document.getElementById("popup").style.display="flex";
}

function closePopup(){ document.getElementById("popup").style.display="none"; }

function nextSlide(){
let s=document.getElementById("slides");
currentSlide++;
if(currentSlide>=s.children.length) currentSlide=0;
s.style.transform=`translateX(-${currentSlide*100}%)`;
}

function prevSlide(){
let s=document.getElementById("slides");
currentSlide--;
if(currentSlide<0) currentSlide=s.children.length-1;
s.style.transform=`translateX(-${currentSlide*100}%)`;
}
</script>

</body>
</html>
