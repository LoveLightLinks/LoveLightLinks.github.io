<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Light Links | Premium Model Directory</title>
<meta name="description" content="Love Light Links is a premium model directory featuring curated model profiles with direct access links.">
<meta name="robots" content="index, follow">

<!-- Social Preview -->
<meta property="og:title" content="Love Light Links | Premium Model Directory">
<meta property="og:description" content="Explore curated premium model profiles in one clean directory.">
<meta property="og:image" content="https://lovelightlinks.github.io/images/Icon.png">
<meta property="og:url" content="https://lovelightlinks.github.io/">
<meta property="og:type" content="website">

<style>

body {
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #2a003f, #000);
    color:white;
    text-align:center;
}

/* Header */
.header {
    padding:30px 20px 10px;
}

.logo {
    width:140px;
    display:block;
    margin:0 auto;
    animation: float 3s ease-in-out infinite,
               glow 2s ease-in-out infinite alternate;
}
    .slider {
    width:100%;
    overflow:hidden;
    border-radius:10px;
    position:relative;
}

.slides {
    display:flex;
    transition:transform 0.4s ease;
}

.slides img {
    width:100%;
    height:auto;
    max-height:70vh;     /* responsive height */
    object-fit:contain;  /* show full image */
    flex-shrink:0;
}
.slides {
    display:flex;
    align-items:center;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

@keyframes glow {
    from { filter: drop-shadow(0 0 10px #ff00cc); }
    to { filter: drop-shadow(0 0 25px #00ccff); }
}

h1 {
    margin:10px 0 5px;
}

.tagline {
    opacity:0.7;
    font-size:14px;
}

/* Social Buttons */
.social-links {
    margin-top:15px;
}

.social-links a {
    display:inline-block;
    margin:5px 10px;
    padding:8px 18px;
    border-radius:25px;
    text-decoration:none;
    font-size:14px;
    color:white;
    border:1px solid #ff00cc;
    transition:0.3s;
}

.social-links a:hover {
    background:linear-gradient(45deg,#ff00cc,#00ccff);
    box-shadow:0 0 15px #ff00cc;
}

/* Search */
.search-box {
    margin:20px auto;
    width:90%;
    max-width:400px;
}

.search-box input {
    width:100%;
    padding:12px;
    border-radius:25px;
    border:none;
    outline:none;
    background:#111;
    color:white;
    font-size:16px;
}

/* Model Grid */
.grid {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:15px;
    padding:20px;
    max-width:600px;
    margin:auto;
}

.card {
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
    box-shadow:0 0 20px #ff00cc;
}

.card img {
    width:100%;
    height:220px;          /* fixed height */
    object-fit:cover;      /* crop properly */
    border-radius:10px;
}

.card h3 {
    margin:10px 0 5px;
    font-size:16px;
}

/* Popup */
.popup {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:15px;
    box-sizing:border-box;
}

.popup-content {
    width:90%;
    max-width:400px;
    background:#111;
    padding:20px;
    border-radius:15px;
    box-sizing:border-box;
    overflow:hidden;
}

.popup img {
    width:100%;
    border-radius:10px;
}

.popup h3 {
    margin-top:15px;
}

.popup p {
    font-size:14px;
    opacity:0.8;
}

.popup button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#ff00cc;
    color:white;
    cursor:pointer;
}
.card {
    user-select: none;
}

.card img {
    pointer-events: none;
}
.slider {
    touch-action: pan-y;
}
</style>
</head>

<body>

<div class="header">
    <img src="https://lovelightlinks.github.io/images/Icon.png" class="logo">
    <h1>Love Light Links</h1>
    <div class="tagline">Premium Model Directory</div>

    <div class="social-links">
        <a href="https://www.instagram.com/love_light_stream?igsh=MWR6aDM5ZWQ0bWpteA==" target="_blank">Instagram</a>
        <a href="https://x.com/LoveLightStream" target="_blank">X</a>
        <a href="https://t.me/lovelightlinks" target="_blank">Telegram</a>
    </div>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search by Model ID...">
</div>

<div class="grid" id="modelGrid"></div>

<div class="popup" id="popup">
    <div class="popup-content">
        <div class="slider">
    <div class="slides" id="slides"></div>
</div>
        <h3 id="popupID"></h3>
        <p id="popupDesc"></p>
        <button id="visitBtn">Visit</button>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script>

const sheetID = "1mLlHZt6MLsEV4Oq0m9_WQPex94v5JbY0pTgr9hL7PjY";
const sheetURL = `https://opensheet.elk.sh/${sheetID}/Sheet1`;

let models = [];
let shuffled = [];
let displayed = 0;
let popupOpen = false;
let currentSlide = 0;

// Shuffle Function
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Load Models
fetch(sheetURL)
.then(res => res.json())
.then(data => {

    models = data;

    const now = Date.now();
    const stored = localStorage.getItem("modelShuffle");
    const time = localStorage.getItem("shuffleTime");

    if (!stored || !time || now - time > 300000) {
        shuffled = [...models];
        shuffleArray(shuffled);
        localStorage.setItem("modelShuffle", JSON.stringify(shuffled));
        localStorage.setItem("shuffleTime", now);
    } else {
        shuffled = JSON.parse(stored);
    }

    loadMore();
});

// Display 10 at a time
function loadMore() {
    const grid = document.getElementById("modelGrid");

    for (let i = displayed; i < displayed + 10 && i < shuffled.length; i++) {
        const model = shuffled[i];

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${model.Image1}">
            <h3>Model ${model.ID}</h3>
        `;
        card.addEventListener("click", function() {
    openPopup(model);
});

        grid.appendChild(card);
    }

    displayed += 10;
}

// Search
document.getElementById("search").addEventListener("input", function() {
    const value = this.value.trim();

    const grid = document.getElementById("modelGrid");
    grid.innerHTML = "";
    displayed = 0;

    if (!value) {
        loadMore();
        return;
    }

    const result = models.find(m => m.ID === value);

    if (result) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${result.Image1}">
            <h3>Model ${result.ID}</h3>
        `;
        card.onclick = () => openPopup(result);
        grid.appendChild(card);
    }
});

function openPopup(model) {

    const slidesContainer = document.getElementById("slides");
    slidesContainer.innerHTML = "";
    currentSlide = 0;

    // Collect available images
    const images = [
        model.Image1,
        model.Image2,
        model.Image3,
        model.Image4
    ].filter(img => img && img.trim() !== "");

    images.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        slidesContainer.appendChild(img);
    });

    document.getElementById("popupID").innerText = "Model " + model.ID;
    document.getElementById("popupDesc").innerText = model.Name;

    document.getElementById("visitBtn").onclick = function() {
        window.open(model.Link, "_blank");
    };

    document.getElementById("popup").style.display = "flex";

    if (!popupOpen) {
        history.pushState({ popup: true }, "");
        popupOpen = true;
    }

    enableSwipe(images.length);
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
    popupOpen = false;
    history.back(); // return to previous state
}

window.addEventListener("popstate", function(event) {
    if (popupOpen) {
        document.getElementById("popup").style.display = "none";
        popupOpen = false;
    }
});
    function enableSwipe(totalSlides) {
    const slides = document.getElementById("slides");
    let startX = 0;

    slides.ontouchstart = function(e) {
        startX = e.touches[0].clientX;
    };

    slides.ontouchend = function(e) {
        let endX = e.changedTouches[0].clientX;
        let diff = startX - endX;

        if (diff > 50 && currentSlide < totalSlides - 1) {
            currentSlide++;
        } else if (diff < -50 && currentSlide > 0) {
            currentSlide--;
        }

        slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    };
    }
// LOVEHONEY LOAD
const lovehoneyURL = `https://opensheet.elk.sh/${sheetID}/Lovehoney`;

fetch(lovehoneyURL)
.then(res => res.json())
.then(data => {

    const section = document.createElement("div");
    section.innerHTML = "<h2 style='margin-top:40px;'>Recommended For You</h2>";

    const grid = document.createElement("div");
    grid.style.display = "grid";
    grid.style.gridTemplateColumns = "repeat(2,1fr)";
    grid.style.gap = "15px";
    grid.style.maxWidth = "600px";
    grid.style.margin = "20px auto";

    data.slice(0,4).forEach(item => {
        const card = document.createElement("div");
        card.style.background = "rgba(255,255,255,0.05)";
        card.style.padding = "10px";
        card.style.borderRadius = "12px";

        card.innerHTML = `
            <img src="${item.Image}" style="width:100%; border-radius:8px;">
            <p style="font-size:14px;">${item.Title}</p>
            <button onclick="window.open('${item.Link}','_blank')" 
                style="padding:6px 15px; border:none; border-radius:20px; background:#ff00cc; color:white;">
                View
            </button>
        `;

        grid.appendChild(card);
    });

    section.appendChild(grid);
    document.body.appendChild(section);
});
</script>

</body>
</html>
