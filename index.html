<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Light Links | Premium Adult Directory 18+</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#2a003f,#000);
color:white;
text-align:center;
}

.header{padding:25px}
.logo{width:130px}

.search-box{margin:20px}
.search-box input{
width:85%;
padding:12px;
border-radius:25px;
border:none;
background:#111;
color:white;
}

.profile{
max-width:500px;
margin:auto;
padding:20px;
}

.slider{
position:relative;
overflow:hidden;
border-radius:12px;
}

.slides{
display:flex;
transition:0.4s;
}

.slides img{
width:100%;
object-fit:contain;
}

.nav-img{
position:absolute;
top:50%;
transform:translateY(-50%);
background:#ff00cc;
border:none;
border-radius:50%;
width:45px;
height:45px;
color:white;
font-size:22px;
}

.left-img{left:10px}
.right-img{right:10px}

.model-nav{
margin-top:10px;
display:flex;
justify-content:center;
gap:15px;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:15px;
cursor:pointer;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.next-btn{
margin:20px;
padding:12px 25px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff00cc,#00ccff);
color:white;
}

.linkhub{
margin:40px;
}

</style>
</head>
<body>

<div class="header">
<img src="https://lovelightlinks.github.io/images/Icon.png" class="logo">
<h2>Premium Adult Directory</h2>
</div>

<div class="search-box">
<input id="search" placeholder="Search ID or Username">
</div>

<!-- PROFILE -->
<div id="profile" class="profile"></div>

<!-- GALLERY -->
<div id="grid" class="grid"></div>
<button class="next-btn" onclick="nextPage()">Next</button>

<!-- LINK HUB -->
<div class="linkhub" id="linkhub"></div>

<script>

const sheetID="1mLlHZt6MLsEV4Oq0m9_WQPex94v5JbY0pTgr9hL7PjY";
const url=`https://opensheet.elk.sh/${sheetID}/Sheet1`;

let models=[];
let page=0;
let perPage=10;
let currentIndex=0;
let currentImages=[];
let slide=0;

fetch(url)
.then(r=>r.json())
.then(d=>{
models=d;
loadRandomProfile();
loadPage();
checkURL();
});

function loadRandomProfile(){
const m=models[Math.floor(Math.random()*models.length)];
loadProfile(m);
}

function loadProfile(m){

history.pushState(null,null,"?model="+m.ID);

currentIndex=models.indexOf(m);

let imgs=[m.Image1,m.Image2,m.Image3,m.Image4]
.filter(x=>x);

currentImages=imgs.map(x=>"https://lovelightlinks.github.io/images/"+x);

slide=0;

document.getElementById("profile").innerHTML=`
<div class="slider">
<button class="nav-img left-img" onclick="prevImg()">❮</button>
<div class="slides" id="slides">
${currentImages.map(i=>`<img src="${i}">`).join("")}
</div>
<button class="nav-img right-img" onclick="nextImg()">❯</button>
</div>

<h2>Model ${m.ID}</h2>
<p>ID: ${m.Username || "-"}</p>
<p>${m.Name}</p>

<div class="model-nav">
<button onclick="prevModel()">❮</button>
<span>${m.ID}</span>
<button onclick="nextModel()">❯</button>
</div>

<button onclick="window.open('${m.Link}','_blank')">Visit</button>
`;

}

function nextImg(){
slide++;
if(slide>=currentImages.length) slide=0;
document.getElementById("slides").style.transform=`translateX(-${slide*100}%)`;
}

function prevImg(){
slide--;
if(slide<0) slide=currentImages.length-1;
document.getElementById("slides").style.transform=`translateX(-${slide*100}%)`;
}

function nextModel(){
currentIndex++;
if(currentIndex>=models.length) currentIndex=0;
loadProfile(models[currentIndex]);
scrollTop();
}

function prevModel(){
currentIndex--;
if(currentIndex<0) currentIndex=models.length-1;
loadProfile(models[currentIndex]);
scrollTop();
}

function scrollTop(){
window.scrollTo({top:0,behavior:"smooth"});
}

function loadPage(){
const g=document.getElementById("grid");
g.innerHTML="";
let start=page*perPage;
let end=start+perPage;

models.slice(start,end).forEach(m=>{
if(!m.Image1) return;
g.innerHTML+=`
<div class="card" onclick='loadProfile(${JSON.stringify(m)})'>
<img src="https://lovelightlinks.github.io/images/${m.Image1}">
<h3>Model ${m.ID}</h3>
</div>
`;
});
}

function nextPage(){
page++;
if(page*perPage>=models.length) page=0;
loadPage();
}

document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();

let m=models.find(x=>
(x.ID && x.ID.toLowerCase()==v) ||
(x.Username && x.Username.toLowerCase()==v)
);

if(m) loadProfile(m);
});

function checkURL(){
let p=new URLSearchParams(window.location.search);
let id=p.get("model");
if(id){
let m=models.find(x=>x.ID==id);
if(m) loadProfile(m);
}
}

</script>

</body>
</html>
