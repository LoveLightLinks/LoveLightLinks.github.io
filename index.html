<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Light Links | Premium Adult Directory 18+</title>

<style>
body {
margin:0;
font-family: Arial, sans-serif;
background: radial-gradient(circle at top, #2a003f, #000);
color:white;
text-align:center;
}

.header { padding:30px 20px 10px; }

.logo {
width:140px;
margin:auto;
animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
}

@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }
}

@keyframes glow {
from { filter: drop-shadow(0 0 10px #ff00cc); }
to { filter: drop-shadow(0 0 25px #00ccff); }
}

.search-box {
margin:20px auto;
width:90%;
max-width:400px;
}

.search-box input {
width:100%;
padding:12px;
border-radius:25px;
border:none;
background:#111;
color:white;
}

.profile {
max-width:600px;
margin:20px auto;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:15px;
display:none;
}

.slider { position:relative; overflow:hidden; border-radius:10px; }
.slides { display:flex; transition:0.4s; }
.slides img { width:100%; flex-shrink:0; }

.nav-btn {
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.7);
border:none;
color:white;
font-size:24px;
width:40px;
height:40px;
border-radius:50%;
}

.left { left:10px; }
.right { right:10px; }

.grid {
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
max-width:600px;
margin:auto;
padding:20px;
}

.card {
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:15px;
cursor:pointer;
}

.card img {
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.next-btn {
margin:20px;
padding:12px 25px;
border-radius:25px;
border:none;
background:linear-gradient(45deg,#ff00cc,#00ccff);
color:white;
}
</style>
</head>

<body>

<div class="header">
<img src="https://lovelightlinks.github.io/images/Icon.png" class="logo">
<h1>Love Light Links</h1>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search Model or Username">
</div>

<div class="profile" id="profile">
<div class="slider">
<button class="nav-btn left" onclick="prev()">❮</button>
<div class="slides" id="slides"></div>
<button class="nav-btn right" onclick="next()">❯</button>
</div>
<h3 id="profileModel"></h3>
<p id="profileUser"></p>
<p id="profileBio"></p>
<button id="visitBtn">Visit</button>
</div>

<div class="grid" id="grid"></div>
<button class="next-btn" onclick="nextPage()">Next</button>

<script>

const sheetID = "1mLlHZt6MLsEV4Oq0m9_WQPex94v5JbY0pTgr9hL7PjY";
const url = `https://opensheet.elk.sh/${sheetID}/Sheet1`;

let models = [];
let index = 0;
let current = 0;

fetch(url).then(r=>r.json()).then(data=>{
models = data;
loadGrid();
loadFromURL();
});

function loadGrid(){
const grid = document.getElementById("grid");
grid.innerHTML="";
for(let i=index;i<index+10;i++){
if(!models[i]) break;
if(!models[i].Image1) continue;
grid.innerHTML += `
<div class="card" onclick="openProfile('${models[i].ID}')">
<img src="https://lovelightlinks.github.io/images/${models[i].Image1}">
<h3>Model ${models[i].ID}</h3>
</div>`;
}
}

function nextPage(){
index +=10;
if(index>=models.length) index=0;
loadGrid();
}

function openProfile(id){
const m = models.find(x=>x.ID==id);
if(!m) return;

history.pushState(null,null,"?model="+id);

document.getElementById("profile").style.display="block";
document.getElementById("profileModel").innerText="Model: "+m.ID;
document.getElementById("profileUser").innerText="ID: "+(m.Username||"");
document.getElementById("profileBio").innerText=m.Name||"";

document.getElementById("visitBtn").onclick=()=>window.open(m.Link);

const slides = document.getElementById("slides");
slides.innerHTML="";

["Image1","Image2","Image3","Image4"].forEach(img=>{
if(m[img]){
slides.innerHTML+=`<img src="https://lovelightlinks.github.io/images/${m[img]}">`;
}
});
current=0;
slides.style.transform="translateX(0%)";
}

function loadFromURL(){
const params = new URLSearchParams(window.location.search);
const id = params.get("model");
if(id) openProfile(id);
}

document.getElementById("search").addEventListener("input", e=>{
const v = e.target.value.toLowerCase();
const found = models.find(m =>
(m.ID && m.ID.toLowerCase()==v) ||
(m.Username && m.Username.toLowerCase()==v)
);
if(found) openProfile(found.ID);
});

function next(){
const slides = document.getElementById("slides");
const total = slides.children.length;
current++;
if(current>=total) current=0;
slides.style.transform=`translateX(-${current*100}%)`;
}

function prev(){
const slides = document.getElementById("slides");
const total = slides.children.length;
current--;
if(current<0) current=total-1;
slides.style.transform=`translateX(-${current*100}%)`;
}

</script>

</body>
</html>
